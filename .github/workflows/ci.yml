name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.8"

      - name: GoReleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "v2.15.2"
          args: check

      - name: Go tests
        run: go test -count=1 ./...

      - name: Build Go CLI
        run: |
          mkdir -p bin
          go build -o bin/gandalf ./cmd/gandalf

      - name: Install script smoke
        run: ./scripts/install-smoke.sh

      - name: Restore-safety regression
        run: ./scripts/restore-safety-regression.sh

      - name: Gate 2 setup-console acceptance
        run: ./scripts/gate2-console-acceptance.sh
