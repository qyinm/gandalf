name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        bun-version: [1.3.14]

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build

  go:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"

      - name: GoReleaser config check
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "v2.15.2"
          args: check

      - name: Go tests
        run: go test ./...

      - name: Build Go CLI
        run: go build -o bin/gandalf ./cmd/gandalf

      - name: Install script smoke
        run: ./scripts/install-smoke.sh

      - name: Gate 2 acceptance (Go binary)
        run: node scripts/gate2-acceptance.mjs
