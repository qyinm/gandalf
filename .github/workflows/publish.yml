name: Publish

on:
  push:
    branches: [main]
    paths:
      - package.json
      - bun.lock
      - packages/core/package.json
      - apps/tui/package.json
      - apps/cli/package.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION="$(bun -p "require('./apps/cli/package.json').version")"
          NAME="$(bun -p "require('./apps/cli/package.json').name")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
      - run: bun run test

      - name: Publish workspace packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          bun publish --cwd packages/core --access public --tolerate-republish
          bun publish --cwd apps/tui --access public --tolerate-republish
          bun publish --cwd apps/cli --access public --tolerate-republish

      - name: Check GitHub Release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.release.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.package.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.package.outputs.tag }}" \
            --generate-notes \
            --latest
