# npm workspace publish for @qxinm/gandalf packages.
# Go binary releases are handled by .github/workflows/release.yml (GoReleaser on v* tags).
name: Publish

on:
  push:
    branches: [main]
    paths:
      - package.json
      - bun.lock
      - README.md
      - PRODUCT.md
      - tsconfig*.json
      - packages/core/**
      - apps/tui/**
      - apps/cli/**
      - scripts/gate2-demo.mjs
      - scripts/package-smoke.mjs
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION="$(bun -p "require('./apps/cli/package.json').version")"
          NAME="$(bun -p "require('./apps/cli/package.json').name")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Require version bump on publish-triggering push
        if: github.event_name == 'push'
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit to compare; allowing initial publish."
            exit 0
          fi
          if ! git cat-file -e "$BEFORE:apps/cli/package.json" 2>/dev/null; then
            echo "Previous CLI package metadata not found; allowing publish."
            exit 0
          fi
          PREVIOUS_VERSION="$(git show "$BEFORE:apps/cli/package.json" | node -e 'let data = ""; process.stdin.on("data", chunk => data += chunk); process.stdin.on("end", () => console.log(JSON.parse(data).version));')"
          CURRENT_VERSION="${{ steps.package.outputs.version }}"
          if [ "$PREVIOUS_VERSION" = "$CURRENT_VERSION" ]; then
            echo "Publish-triggering source changes require an apps/cli/package.json version bump."
            echo "Previous version: $PREVIOUS_VERSION"
            echo "Current version:  $CURRENT_VERSION"
            exit 1
          fi

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run build
      - run: bun run test
      - run: bun run package:smoke

      - name: Publish workspace packages
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          bun publish --cwd packages/core --access public --tolerate-republish
          bun publish --cwd apps/tui --access public --tolerate-republish
          bun publish --cwd apps/cli --access public --tolerate-republish

      - name: Check GitHub Release
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.release.outputs.exists == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.package.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.package.outputs.tag }}" \
            --generate-notes \
            --latest
