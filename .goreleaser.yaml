version: 2

project_name: gandalf

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: gandalf
    main: ./cmd/gandalf
    binary: gandalf
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: gandalf
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

brews:
  - name: gandalf
    repository:
      owner: qyinm
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/qyinm/gandalf
    description: Rollback safety net for Codex setup experiments
    license: MIT
    install: |
      bin.install "gandalf"
    test: |
      system "#{bin}/gandalf", "--help"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
